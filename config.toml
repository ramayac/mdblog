blog_name              = "Rodrigo Amaya"
author_name            = "Rodrigo Amaya"
lang                   = "en"
blog_description       = "Make yourself."
footer_content         = "Made with [mdblog](https://github.com/ramayac/mdblog) 💻"
posts_per_page         = 25
excerpt_length         = 200
show_uncategorized     = true
uncategorized_label    = "General"
show_render_time       = true
posts_dir              = "posts"
pages_dir              = "pages"
post_index_file        = "posts/posts.index.json"
date_format            = "2006-01-02"
default_meta_description = "Personal blog and thoughts of @ramayac."
css_theme              = "assets/css/anthropic.style.css"

[csp]
enabled = true
header  = "Content-Security-Policy: default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:;"

[cache]
enabled        = true
max_age_pages  = 3600   # 1 hour  — HTML pages
max_age_assets = 86400  # 24 hours — CSS/JS/images

[feed]
enabled     = true
base_url    = "https://ramayac.com"
max_items   = 20
output_file = "feed.xml"

[sitemap]
enabled              = true
output_file          = "sitemap.xml"
robots_file          = "robots.txt"
changefreq_home      = "weekly"
changefreq_category  = "weekly"
changefreq_post      = "monthly"
priority_home        = "1.0"
priority_category    = "0.8"
priority_post        = "0.6"

# [[menu.pinned]]
# category = "guides"
# order    = 2

[[menu.dropdowns]]
label = "Writings"
item = [
    { category = "personal", order = 1 },
    { category = "substack", order = 4 },
    { category = "srbyte", order = 5 }
]

[[menu.dropdowns]]
label = "Projects"
item = [
    { category = "tools", order = 1 }
]

[[menu_links]]
label = "Home"
url   = "/"

[[menu_links]]
label = "About 💡"
url   = "/page?slug=about"

[categories.personal]
blog_name      = "Personal 🏠"
header_content = "Personal Thoughts and Musings."
folder         = "writings/personal"
index          = true

[categories.substack]
blog_name      = "Code Forward ⏩"
header_content = "(2023) Substack failed newsletter."
folder         = "writings/substack"
index          = false

[categories.srbyte]
blog_name      = "Sr. Byte 👨‍💻"
header_content = "(2007-2010) Tecnologia para todos."
folder         = "writings/srbyte"
index          = false

[categories.projects]
blog_name      = "Projects 🚀"
header_content = "Apps, tools, and side projects I have built."
folder         = "projects"
index          = true

[categories.tools]
blog_name      = "Tools 🛠️"
header_content = "Tools, utilities and other stuff I have built."
folder         = "projects/tools"
index          = false

[categories.guides]
blog_name      = "Guides 📖"
header_content = "Setup guides and reference sheets for MDBlog."
folder         = "guides"
index          = false


