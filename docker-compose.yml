services:
  blog:
    build:
      context: .
      dockerfile: Dockerfile.debug
    image: mdblog:latest
    # Use the HTTP server binary for local development preview.
    # In production, the Lambda entry-point (/lambda) is used instead.
    command: ["/mdblog", "serve"]
    environment:
      - PORT=8080
    ports:
      - "8080:8080"
    restart: unless-stopped

    # ── Harden the container runtime ─────────────────────────────────────────
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    # ── Resource limits ───────────────────────────────────────────────────────
    deploy:
      resources:
        limits:
          memory: 64M
