name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: true

    - name: Build all packages
      run: go build ./...

    - name: Vet
      run: go vet ./...

    - name: Lint config
      run: go run ./cmd/mdblog version > /dev/null

    - name: Build post index
      run: go run ./cmd/mdblog build-index

    - name: Lint links
      run: go run ./cmd/mdblog lint-links

    - name: Run tests
      run: go test ./...
